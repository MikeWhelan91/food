<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shelf API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        background: #f7f3ed;
        color: #17231a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(560px, calc(100vw - 40px));
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(38, 56, 42, 0.12);
        border-radius: 18px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: #526056;
        line-height: 1.45;
      }
      code {
        display: inline-block;
        margin-top: 18px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(38, 56, 42, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #101410;
          color: #f3f0ea;
        }
        main {
          background: rgba(28, 32, 28, 0.9);
          border-color: rgba(255, 255, 255, 0.12);
        }
        p {
          color: #b4b9b1;
        }
        code {
          background: rgba(255, 255, 255, 0.1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shelf API</h1>
      <p>Backend endpoints for Shelf inventory scanning and expiry extraction are online.</p>
      <code>/api/health</code>
    </main>
  </body>
</html>
